[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py e2e_*.py
python_classes = Test*
python_functions = test_*
# Custom markers
# -m "not live"  → skip all real-API tests (safe for CI / offline)
# -m "live"      → run only tests that hit real external APIs (requires .env)
# -m "e2e"       → run only end-to-end pipeline tests
markers =
    live: marks tests that make real API calls (deselect with -m "not live")
    e2e: marks end-to-end pipeline integration tests
# log_cli disabled: causes ValueError on Windows with pytest-asyncio teardown.
# Use: pytest -v --log-cli-level=INFO  to enable live logging per-run.
# Note: test_env_keys.py is excluded via collect_ignore in tests/conftest.py
